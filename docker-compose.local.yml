# Local-only compose file. Use:
#   docker compose -f docker-compose.local.yml up -d
# It avoids the production-only Traefik service and the file-mount
# conflict (Docker Desktop on macOS can't bind-mount ./plans.json
# inside a directory that is already bind-mounted).
services:
  redis:
    image: redis:latest
    container_name: 3xui-shop-redis
    restart: always
    volumes:
      - redis_data:/data

  bot:
    build: .
    image: 3xui-shop-bot:latest
    container_name: 3xui-shop-bot
    # Live-mount the whole app dir so source edits take effect on restart
    # without rebuilding the image.
    volumes:
      - ./app:/app
    env_file:
      - .env
    stop_signal: SIGINT
    restart: "no"
    command: sh -c "
      poetry run alembic -c /app/db/alembic.ini upgrade head &&
      poetry run python /app/__main__.py"
    depends_on:
      - redis

volumes:
  redis_data:
